<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ça décoiffe — Prestations</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFDE7;
    --surface: #FFFFFF;
    --border: #E8E3DB;
    --text: #1C1A17;
    --muted: #7A756C;
    --accent: #C62828;
    --accent-light: #FFEBEE;
    --accent-dark: #8B1A1A;
    --danger: #C94040;
    --danger-light: #FCEAEA;
    --success: #3A7D52;
    --success-light: #EAF4EE;
    --radius: 14px;
    --radius-sm: 8px;
    --brand-yellow: #FFE600;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  header {
    background: var(--brand-yellow);
    border-bottom: 3px solid var(--accent);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .header-date {
    font-size: 0.85rem;
    color: var(--text);
  }

  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

  section { margin-bottom: 1.5rem; }

  .section-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
  }

  /* Category blocks inside the prestations section */
  .category-block { margin-bottom: 1.25rem; }
  .category-block:last-child { margin-bottom: 0; }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 0.875rem 1rem;
    margin-bottom: 0.5rem;
    background: #FFF9C4;
    border-radius: var(--radius-sm);
    border: 1px solid #F0E060;
    transition: background 0.15s;
  }

  .category-header:active {
    background: var(--brand-yellow);
  }

  .category-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0;
  }

  .category-chevron {
    font-size: 1rem;
    color: var(--accent);
    transition: transform 0.2s ease;
    flex-shrink: 0;
    margin-left: 0.75rem;
  }

  .category-block.collapsed .category-chevron {
    transform: rotate(-90deg);
  }

  .category-body {
    overflow: hidden;
    max-height: 2000px;
    transition: max-height 0.3s ease;
  }

  .category-block.collapsed .category-body {
    max-height: 0;
  }

  .quick-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
  }

  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.7rem 0.5rem;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .quick-btn:active { transform: scale(0.97); background: var(--accent-light); border-color: var(--accent); }

  .quick-btn-name {
    display: block;
    font-size: 0.825rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }

  .quick-btn-price {
    display: block;
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 500;
  }

  /* Chips shown on buttons (AVS / Standard / Prix libre) */
  .btn-chips {
    display: flex;
    gap: 3px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .chip {
    font-size: 0.68rem;
    padding: 2px 6px;
    border-radius: 50px;
    font-weight: 500;
    white-space: nowrap;
  }

  .chip-avs   { background: var(--accent-light); color: var(--accent-dark); }
  .chip-std   { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .chip-libre { background: #EEF2FF; color: #3730A3; }

  /* Modal — bottom sheet */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-card {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 1.5rem 1.25rem 2rem;
    width: 100%;
    max-width: 680px;
    transform: translateY(24px);
    transition: transform 0.22s ease;
  }

  .modal-overlay.open .modal-card { transform: translateY(0); }

  .modal-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 0 auto 1.25rem;
  }

  .modal-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    margin-bottom: 0.25rem;
  }

  .modal-subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* AVS / Standard selector buttons inside modal */
  .modal-avs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .avs-pick-btn {
    padding: 0.75rem 0.5rem;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .avs-pick-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .avs-pick-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
  .avs-pick-price { font-size: 1rem; font-weight: 500; color: var(--text); }

  .modal-field-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 0.375rem;
  }

  .modal-montant-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.7rem 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    width: 100%;
    margin-bottom: 1rem;
  }

  .modal-montant-input:focus { border-color: var(--accent); }
  .modal-montant-input.error { border-color: var(--danger); }

  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 0.5rem;
  }

  .modal-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .modal-confirm {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .modal-confirm:active { background: var(--accent-dark); }

  .manual-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.125rem;
    display: flex;
    gap: 0.625rem;
    align-items: flex-end;
  }

  .field { display: flex; flex-direction: column; gap: 0.375rem; }
  .field-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  input[type="text"], input[type="number"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.75rem;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent);
  }

  .field-libelle { flex: 1; }
  .field-libelle input { width: 100%; }
  .field-montant input { width: 90px; }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.6rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    align-self: flex-end;
    height: 40px;
  }

  .add-btn:active { transform: scale(0.97); background: var(--accent-dark); }

  .list-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .list-empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .prestation-item {
    display: flex;
    align-items: center;
    padding: 0.875rem 1rem;
    border-bottom: 1px solid var(--border);
    gap: 0.75rem;
    animation: slide-in 0.18s ease-out;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .prestation-item:last-child { border-bottom: none; }

  .prestation-time {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 40px;
  }

  .prestation-name {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .prestation-amount {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    min-width: 56px;
    text-align: right;
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 0.25rem;
    line-height: 1;
    border-radius: 50%;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .del-btn:active { color: var(--danger); background: var(--danger-light); }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.875rem 1rem;
    background: var(--accent-light);
    border-top: 1px solid var(--border);
  }

  .total-label { font-size: 0.85rem; font-weight: 500; color: var(--accent-dark); }

  .total-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--accent-dark);
  }

  .export-section {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .export-btn {
    background: var(--success);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .export-btn:active { transform: scale(0.98); background: #2d6140; }
  .export-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--muted);
    cursor: pointer;
    width: 100%;
    transition: border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .clear-btn:active { color: var(--danger); border-color: var(--danger); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1C1A17;
    color: #fff;
    padding: 0.6rem 1.25rem;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: transform 0.25s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .count-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 500;
    border-radius: 50px;
    padding: 0.1rem 0.45rem;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <span class="header-title">Ça décoiffe</span>
  <span class="header-date" id="headerDate"></span>
</header>

<div class="container">

  <section>
    <div class="section-label">Prestations</div>
    <div id="prestationsSection"></div>
  </section>

  <section>
    <div class="section-label">Saisie manuelle</div>
    <div class="manual-card">
      <div class="field field-libelle">
        <span class="field-label">Prestation</span>
        <input type="text" id="inputLibelle" placeholder="ex: balayage" autocomplete="off" autocorrect="off">
      </div>
      <div class="field field-montant">
        <span class="field-label">Montant (CHF)</span>
        <input type="number" id="inputMontant" placeholder="0.00" min="0" step="0.05" inputmode="decimal">
      </div>
      <button class="add-btn" onclick="addManual()">+ Ajouter</button>
    </div>
  </section>

  <section>
    <div class="section-label">Journée en cours <span class="count-badge" id="countBadge">0</span></div>
    <div class="list-card">
      <div id="prestationList"></div>
      <div class="total-row" id="totalRow" style="display:none">
        <span class="total-label">Total du jour</span>
        <span class="total-amount" id="totalAmount">CHF 0.00</span>
      </div>
    </div>
  </section>

  <section class="export-section">
    <div class="section-label">Export Winbiz</div>
    <button class="export-btn" id="exportBtn" onclick="exportCSV()" disabled>
      Générer le fichier d'import Winbiz
    </button>
    <button class="clear-btn" onclick="clearDay()">Vider la journée</button>
  </section>

</div>

<!-- Price selection / adjustment modal (bottom sheet) -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="modal-avs-grid" id="modalAvsGrid" style="display:none"></div>
    <div class="modal-field-label">Montant (CHF)</div>
    <input type="number" class="modal-montant-input" id="modalMontant"
           placeholder="0.00" min="0" step="0.05" inputmode="decimal">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-confirm" onclick="confirmModal()">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// Prestations catalogue — compte 3022
// Types :
//   price           → montant fixe (ajustable dans le modal)
//   avsPrix/normalPrix → deux variantes (AVS moins cher / standard)
//   variable: true  → prix libre, aucune valeur par défaut
// ---------------------------------------------------------------------------
const CATEGORIES = [
  {
    label: 'Enfants & Jeunes',
    items: [
      { code: '004', name: 'Coupe tout petit',                             price: 10 },
      { code: '001', name: 'Coupe enfant',      subtitle: "jusqu'à 16 ans", price: 20 },
      { code: '002', name: 'Coupe jeune étudiant·e',                       price: 23 },
      { code: '003', name: 'Coupe jeune fille + shampooing + lissage',     price: 35 },
    ]
  },
  {
    label: 'Hommes',
    items: [
      { code: '010', name: 'Coupe homme',             subtitle: 'dès 20 ans', price: 25 },
      { code: '011', name: 'Coupe homme + shampooing',                        price: 32 },
      { code: '012', name: 'Coupe couronne',                                  price: 20 },
      { code: '013', name: 'Coupe tondeuse',                                  price: 23 },
      { code: '014', name: 'Coupe + couleur homme',                           price: 46 },
    ]
  },
  {
    label: 'Dames — Brushing & Coupe',
    items: [
      { code: '020/021', name: 'Brushing + shampooing',              avsPrix: 35, normalPrix: 36 },
      { code: '022',     name: 'Mise en plis + shampooing',          avsPrix: 34, avsOnly: true  },
      { code: '023/024', name: 'Coupe + brushing / mise en plis',   avsPrix: 51, normalPrix: 53 },
      { code: '025',     name: 'Coupe séchage aux doigts',           price: 50                   },
    ]
  },
  {
    label: 'Dames — Couleur',
    items: [
      { code: '026',     name: 'Couleur + brushing / mise en plis',        price: 58 },
      { code: '027',     name: 'Couleur + brushing cheveux longs',         price: 67 },
      { code: '028/029', name: 'Couleur + coupe + brushing', avsPrix: 84, normalPrix: 86 },
      { code: '030',     name: 'Couleur + coupe + séchage rapide',         price: 80 },
    ]
  },
  {
    label: 'Dames — Mèches',
    items: [
      { code: '031', name: 'Mèches bonnet + brushing',          price: 85  },
      { code: '032', name: 'Mèches bonnet + coupe + brushing',  price: 110 },
      { code: '033', name: 'Mèches papiers petit',     subtitle: '2.50 / pièce', variable: true },
      { code: '034', name: 'Mèches papiers grand',     subtitle: '3.00 / pièce', variable: true },
      { code: '035', name: 'Mèches papiers multicouleurs', subtitle: '3.50 / pièce', variable: true },
    ]
  },
  {
    label: 'Dames — Permanente',
    items: [
      { code: '038/039', name: 'Permanente + brushing',            avsPrix: 80,  normalPrix: 85  },
      { code: '036/037', name: 'Permanente + coupe + brushing',    avsPrix: 100, normalPrix: 105 },
      { code: '040',     name: 'Permanente cheveux longs + coupe', price: 140 },
      { code: '041',     name: 'Permanente spirale',               price: 140 },
    ]
  },
  {
    label: 'Dames — Combinaisons prix libre',
    items: [
      { code: '042', name: 'Couleur + coupe + mèches', variable: true },
      { code: '043', name: 'Mèches + coupe',           variable: true },
      { code: '044', name: 'Couleur + mèches',         variable: true },
    ]
  },
  {
    label: 'Spécial & Événements',
    items: [
      { code: '050', name: 'Massage huiles essentielles', price: 17  },
      { code: '051', name: 'Chignon de soirée',           price: 65  },
      { code: '052', name: 'Chignon de mariage',          price: 75  },
      { code: '053', name: 'Forfait mariage',             price: 140 },
    ]
  },
  {
    label: 'Divers',
    items: [
      { code: '100', name: 'Ventes prix variable', variable: true },
    ]
  },
];

// Flat index for modal lookups
const FLAT_ITEMS = [];
CATEGORIES.forEach(cat => cat.items.forEach(item => FLAT_ITEMS.push(item)));

const COMPTE_DEBIT  = '1010';
const COMPTE_CREDIT = '3022';
const JOURNAL       = 'VE';
const STORAGE_KEY   = 'salon_prestations';

let prestations = [];

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    prestations = raw ? JSON.parse(raw) : [];
  } catch { prestations = []; }
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prestations));
}

function addPrestation(libelle, montant) {
  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  prestations.push({ id: Date.now(), libelle, montant: parseFloat(montant), time: hhmm });
  saveToStorage();
  render();
  toast(`${libelle} — CHF ${parseFloat(montant).toFixed(2)}`);
}

function removePrestation(id) {
  prestations = prestations.filter(p => p.id !== id);
  saveToStorage();
  render();
}

function addManual() {
  const libelle = document.getElementById('inputLibelle').value.trim();
  const montant = parseFloat(document.getElementById('inputMontant').value);
  if (!libelle || isNaN(montant) || montant <= 0) {
    toast('Libellé et montant requis');
    return;
  }
  addPrestation(libelle, montant);
  document.getElementById('inputLibelle').value = '';
  document.getElementById('inputMontant').value = '';
}

// ---------------------------------------------------------------------------
// Modal — price selection / adjustment
// ---------------------------------------------------------------------------
let _modalName = '';

function openModal(idx) {
  const item = FLAT_ITEMS[idx];
  _modalName = item.name;

  document.getElementById('modalName').textContent = item.name;

  const sub = document.getElementById('modalSubtitle');
  sub.textContent = item.subtitle || '';
  sub.style.display = item.subtitle ? '' : 'none';

  const grid = document.getElementById('modalAvsGrid');
  const input = document.getElementById('modalMontant');
  input.classList.remove('error');

  if (item.avsPrix !== undefined) {
    // Build AVS / Standard selector
    grid.style.display = '';
    const avsName = item.name + ' (AVS)';
    grid.innerHTML = `
      <button class="avs-pick-btn" id="avsBtn"
              onclick="selectAvsPrice(${item.avsPrix}, '${escJs(avsName)}')">
        <div class="avs-pick-label">AVS</div>
        <div class="avs-pick-price">CHF ${item.avsPrix.toFixed(2)}</div>
      </button>` +
      (!item.avsOnly ? `
      <button class="avs-pick-btn" id="stdBtn"
              onclick="selectAvsPrice(${item.normalPrix}, '${escJs(item.name)}')">
        <div class="avs-pick-label">Standard</div>
        <div class="avs-pick-price">CHF ${item.normalPrix.toFixed(2)}</div>
      </button>` : '');
    // Pre-select AVS
    selectAvsPrice(item.avsPrix, avsName);
  } else {
    grid.style.display = 'none';
    grid.innerHTML = '';
    input.value = item.variable ? '' : item.price.toFixed(2);
  }

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => input.focus(), 220);
}

function selectAvsPrice(price, name) {
  _modalName = name;
  document.getElementById('modalMontant').value = price.toFixed(2);
  document.querySelectorAll('.avs-pick-btn').forEach(btn => btn.classList.remove('selected'));
  // Mark the button that matches
  document.querySelectorAll('.avs-pick-btn').forEach(btn => {
    const priceEl = btn.querySelector('.avs-pick-price');
    if (priceEl && parseFloat(priceEl.textContent.replace('CHF ', '')) === price) {
      btn.classList.add('selected');
    }
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  _modalName = '';
}

function confirmModal() {
  const input = document.getElementById('modalMontant');
  const montant = parseFloat(input.value);
  if (isNaN(montant) || montant <= 0) {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 1500);
    return;
  }
  addPrestation(_modalName, montant);
  closeModal();
}

function render() {
  const list = document.getElementById('prestationList');
  const totalRow = document.getElementById('totalRow');
  const badge = document.getElementById('countBadge');
  const exportBtn = document.getElementById('exportBtn');

  badge.textContent = prestations.length;
  exportBtn.disabled = prestations.length === 0;

  if (prestations.length === 0) {
    list.innerHTML = '<div class="list-empty">Aucune prestation saisie</div>';
    totalRow.style.display = 'none';
    return;
  }

  list.innerHTML = prestations.map(p => `
    <div class="prestation-item">
      <span class="prestation-time">${p.time}</span>
      <span class="prestation-name">${escHtml(p.libelle)}</span>
      <span class="prestation-amount">CHF ${p.montant.toFixed(2)}</span>
      <button class="del-btn" onclick="removePrestation(${p.id})" aria-label="Supprimer">✕</button>
    </div>
  `).join('');

  const total = prestations.reduce((s, p) => s + p.montant, 0);
  document.getElementById('totalAmount').textContent = 'CHF ' + total.toFixed(2);
  totalRow.style.display = 'flex';
}

function buildCSV() {
  const today = formatDate(new Date());
  const lines = ['Date;N° Pièce;Cpte Débit;Cpte Crédit;Libellé;Montant;Journal'];
  prestations.forEach((p, i) => {
    const row = [
      today,
      (i + 1).toString(),
      COMPTE_DEBIT,
      COMPTE_CREDIT,
      p.libelle.replace(/;/g, ','),
      p.montant.toFixed(2),
      JOURNAL
    ];
    lines.push(row.join(';'));
  });
  return lines.join('\r\n');
}

async function exportCSV() {
  if (prestations.length === 0) return;
  const filename = 'winbiz_' + formatDateFile(new Date()) + '.csv';
  const csv = buildCSV();
  const blob = new Blob([csv], { type: 'text/csv;charset=windows-1252' });

  if (navigator.canShare && navigator.canShare({ files: [new File([blob], filename)] })) {
    try {
      await navigator.share({
        title: 'Import Winbiz — ' + formatDate(new Date()),
        text: 'Fichier d\'import des écritures Winbiz',
        files: [new File([blob], filename, { type: 'text/csv' })]
      });
      toast('Fichier partagé');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast('Fichier téléchargé — prêt à importer dans Winbiz');
}

function clearDay() {
  if (prestations.length === 0) return;
  if (!confirm('Vider toutes les prestations de la journée ?')) return;
  prestations = [];
  saveToStorage();
  render();
}

function formatDate(d) {
  return d.getDate().toString().padStart(2,'0') + '.' +
         (d.getMonth()+1).toString().padStart(2,'0') + '.' +
         d.getFullYear();
}

function formatDateFile(d) {
  return d.getFullYear() + '-' +
         (d.getMonth()+1).toString().padStart(2,'0') + '-' +
         d.getDate().toString().padStart(2,'0');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escJs(str) {
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function initHeader() {
  const d = new Date();
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('headerDate').textContent =
    days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function initCategories() {
  const section = document.getElementById('prestationsSection');
  section.innerHTML = CATEGORIES.map(cat => {
    const buttons = cat.items.map((item, localIdx) => {
      const globalIdx = FLAT_ITEMS.indexOf(item);
      let priceHtml;
      if (item.avsPrix !== undefined) {
        priceHtml = `<div class="btn-chips">
          <span class="chip chip-avs">AVS CHF ${item.avsPrix.toFixed(2)}</span>` +
          (!item.avsOnly
            ? `<span class="chip chip-std">CHF ${item.normalPrix.toFixed(2)}</span>`
            : '') +
          `</div>`;
      } else if (item.variable) {
        priceHtml = `<div class="btn-chips"><span class="chip chip-libre">Prix libre</span></div>`;
      } else {
        priceHtml = `<span class="quick-btn-price">CHF ${item.price.toFixed(2)}</span>`;
      }
      return `<button class="quick-btn" onclick="openModal(${globalIdx})">
        <span class="quick-btn-name">${escHtml(item.name)}</span>
        ${priceHtml}
      </button>`;
    }).join('');

    return `<div class="category-block collapsed">
      <div class="category-header" onclick="toggleCategory(this.closest('.category-block'))" aria-expanded="false">
        <div class="category-label">${escHtml(cat.label)}</div>
        <span class="category-chevron">▼</span>
      </div>
      <div class="category-body">
        <div class="quick-grid">${buttons}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleCategory(block) {
  block.classList.toggle('collapsed');
  const header = block.querySelector('.category-header');
  header.setAttribute('aria-expanded', !block.classList.contains('collapsed'));
}

document.getElementById('modalMontant').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('inputMontant').addEventListener('keydown', e => {
  if (e.key === 'Enter') addManual();
});
document.getElementById('inputLibelle').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inputMontant').focus();
});

loadFromStorage();
initHeader();
initCategories();
render();
</script>
</body>
</html>
