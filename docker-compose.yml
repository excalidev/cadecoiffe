services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cadecoiffe
      POSTGRES_USER: cadecoiffe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadecoiffe"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/src/CadeCoiffe.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=cadecoiffe;Username=cadecoiffe;Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Admin__Email: ${ADMIN_EMAIL}
      Admin__Password: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
